<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Строй Град Проект</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Логотип">
    <h1>Строй Град Проект</h1>
  </div>
</header>

<main>
  <!-- Объекты -->
  <section class="objects">
    <h2>Объекты</h2>
    <button class="add-btn" onclick="openModal('add-object')">Добавить объект</button>
    <div class="objects-grid"></div>
  </section>

  <!-- Задачи -->
  <section class="tasks">
    <h2>Задачи</h2>
    <button class="add-btn" onclick="openModal('add-task')">Добавить задачу</button>
    <div class="tasks-grid"></div>
  </section>

  <!-- Сотрудники -->
  <section class="employees">
    <h2>Сотрудники</h2>
    <div class="employee-grid"></div>
  </section>
</main>

<!-- Модальные окна -->
<div id="add-object" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('add-object')">&times;</span>
    <h3>Добавить объект</h3>
    <input type="text" id="object-name" placeholder="Название объекта">
    <textarea id="object-desc" placeholder="Описание"></textarea>
    <button onclick="addObject()">Сохранить</button>
  </div>
</div>

<div id="add-task" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('add-task')">&times;</span>
    <h3>Добавить задачу</h3>
    <input type="text" id="task-name" placeholder="Название задачи">
    <select id="task-status">
      <option value="set">Задано</option>
      <option value="in_progress">В работе</option>
      <option value="done">Завершено</option>
    </select>
    <select id="task-employee">
      <!-- JS подставит сотрудников -->
    </select>
    <button onclick="addTask()">Сохранить</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
