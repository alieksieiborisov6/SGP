<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SGP Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>SGP Manager</h1>

<select id="employeeFilter">
<option value="all">Все сотрудники</option>
<option>Иван</option>
<option>Алексей</option>
<option>Сергей</option>
<option>Дмитрий</option>
</select>

</header>


<div class="container">

<div class="objects">

<div class="topbar">

<h2>Объекты</h2>

<button class="addObjectBtn" onclick="openModal('objectModal')">
+ Добавить объект
</button>

</div>

<div id="objectsList"></div>

</div>


<div class="tasks">

<div class="topbar">

<h2>Задачи</h2>

<button class="addTaskBtn" onclick="openModal('taskModal')">
+ Добавить задачу
</button>

</div>

<div id="tasksList"></div>

</div>

</div>



<!-- OBJECT MODAL -->

<div id="objectModal" class="modal">

<div class="modal-content">

<h3>Объект</h3>

<input id="objectName" placeholder="Название">

<textarea id="objectDesc" placeholder="Описание"></textarea>

<button class="saveBtn" onclick="saveObject()">Сохранить</button>

<button onclick="closeModal('objectModal')">Отмена</button>

</div>

</div>



<!-- TASK MODAL -->

<div id="taskModal" class="modal">

<div class="modal-content">

<h3>Задача</h3>

<input id="taskName" placeholder="Название">

<textarea id="taskDesc" placeholder="Описание"></textarea>

<select id="taskEmployee">

<option>Иван</option>
<option>Алексей</option>
<option>Сергей</option>
<option>Дмитрий</option>

</select>

<input type="date" id="taskDeadline">

<button class="saveBtn" onclick="saveTask()">Сохранить</button>

<button onclick="closeModal('taskModal')">Отмена</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
