<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="logo.jpg" type="image/x-icon">
<title>СГП</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <h1>СтройГрадПроект</h1>
  </div>
  <div class="user-filter">
    <label for="current-employee">Показать задачи:</label>
    <select id="current-employee"></select>
  </div>
</header>

<main>
  <div class="container">
    <section class="objects-section">
      <h2>Объекты</h2>
      <button class="add-btn" onclick="openModal('add-object')">Добавить объект</button>
      <div class="objects-grid"></div>
    </section>

    <section class="tasks-section">
      <h2>Задачи</h2>
      <button class="add-btn" onclick="openModal('add-task')">Добавить задачу</button>
      <div class="tasks-grid"></div>
    </section>
  </div>
</main>

<!-- Модалки -->
<div id="add-object" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('add-object')">&times;</span>
    <h3>Добавить объект</h3>
    <input type="text" id="object-name" placeholder="Название объекта">
    <textarea id="object-desc" placeholder="Описание объекта"></textarea>
    <button class="save-btn" onclick="addObject()">Сохранить</button>
  </div>
</div>

<div id="edit-object" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('edit-object')">&times;</span>
    <h3>Редактировать объект</h3>
    <input type="text" id="edit-object-name" placeholder="Название объекта">
    <textarea id="edit-object-desc" placeholder="Описание объекта"></textarea>
    <button class="save-btn" onclick="saveObjectEdit()">Сохранить</button>
  </div>
</div>

<div id="add-task" class="modal">
  <select id="edit-task-employee"></select>
  <div class="modal-content">
    <span class="close" onclick="closeModal('add-task')">&times;</span>
    <h3>Добавить задачу</h3>
    <input type="text" id="task-name" placeholder="Название задачи">
    <textarea id="task-desc" placeholder="Описание задачи"></textarea>
    <select id="task-status">
      <option value="set">Задано</option>
      <option value="in_progress">В работе</option>
      <option value="done">Завершено</option>
    </select>
    <select id="task-employee"></select>
    <button class="save-btn" onclick="addTask()">Сохранить</button>
  </div>
</div>

<div id="edit-task" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('edit-task')">&times;</span>
    <h3>Редактировать задачу</h3>
    <input type="text" id="edit-task-name" placeholder="Название задачи">
    <textarea id="edit-task-desc" placeholder="Описание задачи"></textarea>
    <select id="edit-task-status">
      <option value="set">Задано</option>
      <option value="in_progress">В работе</option>
      <option value="done">Завершено</option>
    </select>
    <select id="edit-task-employee"></select>
    <button class="save-btn" onclick="saveTaskEdit()">Сохранить</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
