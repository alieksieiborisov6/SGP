<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="logo.jpg" type="image/x-icon">
<title>SGP Управление объектами</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>SGP Управление объектами</h1>
</header>

<div class="container">

<div class="left-panel">

<h2>Объекты</h2>

<button onclick="openModal('add-object')">Добавить объект</button>

<div class="objects-grid"></div>

</div>


<div class="right-panel">

<h2>Задачи</h2>

<button onclick="openModal('add-task')">Добавить задачу</button>

<div class="tasks-grid"></div>

</div>

</div>


<!-- МОДАЛКА ОБЪЕКТА -->

<div id="add-object" class="modal">

<div class="modal-content">

<span onclick="closeModal('add-object')" class="close">×</span>

<h3>Добавить объект</h3>

<input id="object-name" placeholder="Название объекта">

<textarea id="object-desc" placeholder="Описание"></textarea>

<button onclick="addObject()">Сохранить</button>

</div>

</div>


<!-- МОДАЛКА ЗАДАЧИ -->

<div id="add-task" class="modal">

<div class="modal-content">

<span onclick="closeModal('add-task')" class="close">×</span>

<h3>Добавить задачу</h3>

<input id="task-name" placeholder="Название задачи">

<textarea id="task-desc" placeholder="Описание"></textarea>

<button onclick="addTask()">Сохранить</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
