<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SGP Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>SGP Manager</h1>

<select id="employeeFilter">
<option value="all">Все сотрудники</option>
<option>Иван</option>
<option>Алексей</option>
<option>Сергей</option>
<option>Дмитрий</option>
</select>

</header>


<div class="container">

<div class="objects">

<div class="top-bar">

<h2>Объекты</h2>

<button onclick="openModal('objectModal')">+ Объект</button>

</div>

<div id="objectsList"></div>

</div>


<div class="tasks">

<div class="top-bar">

<h2>Задачи</h2>

<button onclick="openModal('taskModal')">+ Задача</button>

</div>

<div id="tasksList"></div>

</div>

</div>


<!-- МОДАЛКА ОБЪЕКТА -->

<div id="objectModal" class="modal">

<div class="modal-content">

<h3>Создать объект</h3>

<input id="objectName" placeholder="Название">

<textarea id="objectDesc" placeholder="Описание"></textarea>

<button onclick="createObject()">Создать</button>

<button onclick="closeModal('objectModal')">Отмена</button>

</div>

</div>


<!-- МОДАЛКА ЗАДАЧИ -->

<div id="taskModal" class="modal">

<div class="modal-content">

<h3>Создать задачу</h3>

<input id="taskName" placeholder="Название">

<textarea id="taskDesc" placeholder="Описание"></textarea>

<select id="taskEmployee">

<option>Иван</option>
<option>Алексей</option>
<option>Сергей</option>
<option>Дмитрий</option>

</select>

<select id="taskStatus">

<option>Задано</option>
<option>В работе</option>
<option>Завершено</option>

</select>

<button onclick="createTask()">Создать</button>

<button onclick="closeModal('taskModal')">Отмена</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
